name: Supabase Günlük Yedekleme

on:
  schedule:
    - cron: '0 21 * * *' # Her gün TSİ 00:00 (UTC 21:00)
  workflow_dispatch: # Manuel tetikleme için

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Set Timestamp
        id: timestamp
        run: echo "NOW=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      - name: Resolve Supabase Host to IPv4
        run: |
          # Supabase pooler IP'sini elinizle çözüp sisteme tanıtıyoruz
          SUPABASE_IP=$(dig +short jgonjcfxeaigsaokpqoz.pooler.supabase.com | tail -n1)
          if [ -z "$SUPABASE_IP" ]; then
            # Eğer dig bulamazsa alternatif olarak genel pooler bloğundan IPv4 adresini zorluyoruz
            SUPABASE_IP="65.109.117.202" 
          fi
          echo "$SUPABASE_IP jgonjcfxeaigsaokpqoz.pooler.supabase.com" | sudo tee -a /etc/hosts

      - name: Backup Database
        run: |
          export PGPASSWORD="${{ secrets.DB_PASSWORD }}"

          pg_dump -h jgonjcfxeaigsaokpqoz.pooler.supabase.com \
                  -U postgres.jgonjcfxeaigsaokpqoz \
                  -p 6543 \
                  -d postgres \
                  --no-password \
                  -F c \
                  -b \
                  -v > backup_${{ env.NOW }}.dump

      - name: Upload Backup as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.NOW }}
          path: backup_${{ env.NOW }}.dump
          retention-days: 30